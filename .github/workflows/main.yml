name: Android Build
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: setup Android SDK
        # 為此步驟命名，以便後續引用 SDK 路徑
        id: setup-android
        uses: android-actions/setup-android@v3

      - name: install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: install dependencies
        run: |
          npm install
          npm install @tauri-apps/cli@next

      - name: build tauri android
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 關鍵修正：透過環境變數精確引導 Rust 找到 NDK 組件
          NDK_HOME: ${{ steps.setup-android.outputs.sdk-path }}/ndk-bundle
        with:
          tagName: v0.1.0
          releaseName: 'Limbus Manager v0.1.0'
          releaseBody: 'Automated Android Build'
          distPath: dist
          projectPath: src-tauri
          args: --target android --no-bundle
