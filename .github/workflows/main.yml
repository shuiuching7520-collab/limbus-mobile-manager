name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # 預先裝好編譯所需的所有 Android 架構
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Install Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Build Android App (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./
          # 關鍵修正：加入 --apk 參數，避免 Bundle 錯誤
          args: --target aarch64-linux-android --apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Limbus-Manager-Android
          # 這是 APK 產出的路徑
          path: src-tauri/gen/android/app/build/outputs/apk/release/*.apk
