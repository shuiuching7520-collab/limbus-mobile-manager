name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # 補上這行，解決你截圖中 "Target does not exist" 的問題
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Install Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        run: npm install

      # 這裡手動執行 Web Build，避免 tauri-action 出現 "Unexpected Input" 警告
      - name: Build Web Assets
        run: npm run build

      - name: Build Android App (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 指定編譯目標為 Android
          args: --target aarch64-linux-android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Limbus-Manager-Android
          # 這裡的路徑根據 Tauri 預設產出位置
          path: src-tauri/gen/android/app/build/outputs/apk/release/*.apk
