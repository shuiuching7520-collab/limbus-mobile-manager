- name: build tauri android
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v0.1.0
          releaseName: 'Limbus Manager v0.1.0'
          releaseBody: 'Automated Android Build'
          distPath: dist
          projectPath: src-tauri
          # 加入這行，讓它在編譯前先初始化 Android 專案環境
          args: --target android
        beforeBuildCommand: "npx tauri android init"
