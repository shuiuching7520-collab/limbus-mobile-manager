name: Android Build
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: setup Android SDK
        id: setup-android
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;26.1.10909125'

      - name: install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: build tauri android
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NDK_HOME: ${{ steps.setup-android.outputs.sdk-path }}/ndk/26.1.10909125
          ANDROID_HOME: ${{ steps.setup-android.outputs.sdk-path }}
        with:
          tagName: v0.1.0
          releaseName: 'Limbus Manager v0.1.0'
          distPath: dist
          projectPath: src-tauri
          # 解決 "vite: not found" 的關鍵指令
          beforeBuildCommand: |
            npm install
            npx tauri android init --yes
          args: --target android --no-bundle
