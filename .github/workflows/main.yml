name: Android Build
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: setup Android SDK
        id: setup-android
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;26.1.10909125'

      - name: install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Install Frontend and Fix Vite
        # 關鍵修正：直接在系統層級建立 Vite 的捷徑
        run: |
          npm install
          # 強制將專案內的 vite 連結到系統路徑，防止 Tauri 找不到
          sudo ln -s $(pwd)/node_modules/.bin/vite /usr/local/bin/vite
          # 檢查一下是否真的裝好了（會在日誌顯示路徑）
          which vite

      - name: build tauri android
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NDK_HOME: ${{ steps.setup-android.outputs.sdk-path }}/ndk/26.1.10909125
          ANDROID_HOME: ${{ steps.setup-android.outputs.sdk-path }}
        with:
          tagName: v0.1.0
          releaseName: 'Limbus Manager v0.1.0'
          distPath: dist
          projectPath: src-tauri
          # 這裡只做 Android 初始化
          beforeBuildCommand: "npx tauri android init --yes"
          args: --target android --no-bundle
