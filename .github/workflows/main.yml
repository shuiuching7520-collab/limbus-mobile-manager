name: Android Build
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: setup Android SDK
        id: setup-android
        uses: android-actions/setup-android@v3
        with:
          # 強制安裝最穩定的 NDK 版本
          packages: 'ndk;26.1.10909125'

      - name: install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: build tauri android
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 手動鎖定三個關鍵路徑，讓 Rust 不管找哪個標籤都能找到 NDK
          NDK_HOME: ${{ steps.setup-android.outputs.sdk-path }}/ndk/26.1.10909125
          ANDROID_NDK_HOME: ${{ steps.setup-android.outputs.sdk-path }}/ndk/26.1.10909125
          ANDROID_HOME: ${{ steps.setup-android.outputs.sdk-path }}
        with:
          tagName: v0.1.0
          releaseName: 'Limbus Manager v0.1.0'
          distPath: dist
          projectPath: src-tauri
          # 這次我們把所有準備動作合併在點火前執行，確保環境是乾淨且完整的
          beforeBuildCommand: "npm install && npm install @tauri-apps/cli@next && npx tauri android init --yes"
          args: --target android --no-bundle
