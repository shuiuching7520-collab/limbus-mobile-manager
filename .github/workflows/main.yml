name: Android Build
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: setup Android SDK
        id: setup-android
        uses: android-actions/setup-android@v3
        with:
          # 直接強制下載編譯必備零件
          packages: 'ndk;26.1.10909125 platforms;android-34 build-tools;34.0.0'

      - name: install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: build tauri android
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 手動鎖定最核心的環境變數
          NDK_HOME: ${{ steps.setup-android.outputs.sdk-path }}/ndk/26.1.10909125
          ANDROID_HOME: ${{ steps.setup-android.outputs.sdk-path }}
        with:
          tagName: v0.1.0
          releaseName: 'Limbus Manager v0.1.0'
          distPath: dist
          projectPath: src-tauri
          # 關鍵：先給予 gradlew 執行權限，並完整跑一次初始化流程
          beforeBuildCommand: |
            npm install
            npm install @tauri-apps/cli@next
            chmod +x src-tauri/gen/android/gradlew || true
            npx tauri android init --yes
          args: --target android --no-bundle
